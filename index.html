<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster - Ingreso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; min-height: 100vh; }
  </style>
</head>
<body class="d-flex align-items-center py-4">

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <!Logo / Título de la App >
        <div class="text-center mb-4">
          <i class="bi bi-check2-square text-primary fs-1"></i>
          <h1 class="h3 fw-bold text-dark">TaskMaster</h1>
          <p class="text-muted">Organiza tus tareas diarias de forma simple</p>
        </div>

        <div class="card shadow-sm border-0">
          <!Pestañas para alternar entre Login y Registro>
          <div class="card-header bg-primary p-0 border-0">
            <ul class="nav nav-tabs nav-fill border-0" id="authTab" role="tablist">
              <li class="nav-item">
                <button class="nav-link active text-white py-3 fw-semibold border-0 rounded-0" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">
                  <i class="bi bi-shield-lock me-2"></i>Ingresar
                </button>
              </li>
              <li class="nav-item">
                <button class="nav-link text-white py-3 fw-semibold border-0 rounded-0" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">
                  <i class="bi bi-person-plus me-2"></i>Registrarse
                </button>
              </li>
            </ul>
          </div>
          
          <div class="card-body p-4 tab-content">
            <!Formulario de Inicio de Sesion>
            <div class="tab-pane fade show active" id="login-pane">
              <form id="login-form">
                <div class="mb-3">
                  <label for="login-email" class="form-label">Correo Electrónico</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="login-email" required placeholder="tu@correo.com">
                  </div>
                </div>
                <div class="mb-4">
                  <label for="login-password" class="form-label">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="login-password" required placeholder="••••••••">
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Entrar a mis Tareas</button>
              </form>
            </div>

            <! Formulario de Registro >
            <div class="tab-pane fade" id="register-pane">
              <form id="register-form">
                <div class="mb-3">
                  <label for="reg-name" class="form-label">Nombre Completo</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="reg-name" required placeholder="Juan Pérez">
                  </div>
                </div>
                <div class="mb-3">
                  <label for="reg-email" class="form-label">Correo Electrónico</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="reg-email" required placeholder="tu@correo.com">
                  </div>
                </div>
                <div class="mb-4">
                  <label for="reg-password" class="form-label">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="reg-password" required placeholder="Mínimo 6 caracteres">
                  </div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">Registrarme e Ingresar</button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
