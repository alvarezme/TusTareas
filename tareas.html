<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster - Mis Tareas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1 0 auto; }
  </style>
</head>
<body>

  <!BARRA DE NAVEGACIÓN>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <i class="bi bi-check2-square text-primary fs-3"></i>
        <span class="fw-bold">TaskMaster</span>
      </a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light me-3" id="user-display-name">¡Hola!</span>
        <button class="btn btn-outline-danger btn-sm" id="btn-logout">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <!CONTENIDO PRINCIPAL>
  <main class="container my-5">
    <section class="row">
      
      <!Columna Izquierda: Formulario de creación>
      <div class="col-lg-4 mb-4">
        <div class="card shadow-sm border-0 sticky-top" style="top: 20px; z-index: 1020;">
          <div class="card-body p-4">
            <h5 class="card-title fw-bold text-primary mb-3">Nueva Tarea</h5>
            <form id="task-form">
              <div class="mb-3">
                <label for="task-title" class="form-label">Título</label>
                <input type="text" id="task-title" class="form-control" placeholder="Ej: Estudiar para el examen" required>
              </div>
              <div class="mb-3">
                <label for="task-desc" class="form-label">Descripción</label>
                <textarea id="task-desc" class="form-control" rows="3" placeholder="Añade más detalles..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Guardar Tarea
              </button>
            </form>
          </div>
        </div>
      </div>

      <!Columna Derecha: Listado y Filtros>
      <div class="col-lg-8">
        <div class="card shadow-sm border-0 p-4">
          <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
            <h4 class="fw-bold text-dark m-0">Mis Pendientes</h4>
            
            <div class="btn-group shadow-sm" role="group">
              <input type="radio" class="btn-check" name="task-filter" id="filter-all" checked>
              <label class="btn btn-outline-secondary" for="filter-all">Todas</label>

              <input type="radio" class="btn-check" name="task-filter" id="filter-pending">
              <label class="btn btn-outline-secondary" for="filter-pending">Pendientes</label>

              <input type="radio" class="btn-check" name="task-filter" id="filter-completed">
              <label class="btn btn-outline-secondary" for="filter-completed">Completadas</label>
            </div>
          </div>

          <!>Contenedor de Tareas>
          <div id="tasks-container" class="list-group gap-2">
            <div class="text-center py-5 text-muted" id="tasks-placeholder">
              <i class="bi bi-journal-x fs-1"></i>
              <p class="mt-2">No hay tareas creadas todavía.</p>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <footer class="footer mt-auto py-3 bg-white border-top">
    <div class="container text-center text-muted">
      <small>© 2026 TaskMaster - Cilsa </small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="tareas.js"></script>
</body>
</html>
