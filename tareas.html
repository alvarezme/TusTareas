<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tus Tareas - Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="pantalla-tareas">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75 shadow-sm ">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <i class="bi bi-pencil text-primary fs-3"></i>
        <span class="fw-bold">Tus Tareas</span>
      </a>
      <div class="ms-auto d-flex align-items-center">
        <button class="btn btn-outline-danger btn-sm" id="btn-cerrar-sesion">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <section class="row">
      
      
      <div class="col-lg-4 mb-4">
        <div class="card shadow-sm border-0 sticky-top bg-white bg-opacity-75" style="top: 20px; z-index: 1020;">
          <div class="card-body p-4">
            <h5 class="card-title fw-bold text-primary mb-3">Nueva Tarea</h5>
            <form id="formulario-tarea">
              <div class="mb-3">
                <label for="tarea-titulo" class="form-label">Título</label>
                <input type="text" id="tarea-titulo" class="form-control" placeholder="Ej: Estudiar para el examen" required>
              </div>
              <div class="mb-3">
                <label for="tarea-desc" class="form-label">Descripción</label>
                <textarea id="tarea-desc" class="form-control" rows="3" placeholder="Añade más detalles..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Guardar Tarea
              </button>
            </form>
          </div>
        </div>
      </div>

   
      <div class="col-lg-8">
        <div class="card shadow-sm border-0 p-4 bg-white bg-opacity-75">
          <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
            <h4 class="fw-bold text-dark m-0">Mis Pendientes</h4>
          </div>

          <!-- filtros utile para las tareas-->
          <div class="row g-2 mb-4">
            <div class="col-md-7">
              <div class="input-group shadow-sm border rounded">
                <span class="input-group-text bg-white border-0 text-muted"><i class="bi bi-search"></i></span>
                <input type="text" id="filtro-titulo" class="form-control border-0 px-2" placeholder="Buscar por título o descripción...">
              </div>
            </div>
            <div class="col-md-3">
              <select id="filtro-estado" class="form-select shadow-sm border rounded">
                <option value="todos">Todos los estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="en curso">En curso</option>
                <option value="en espera">En espera</option>
                <option value="finalizada">Finalizada</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-secondary w-100 shadow-sm" type="button" id="boton-limpiar-filtros">
                <i class="bi bi-x-circle"></i>
              </button>
            </div>
            <!--orden de las tareas por fechas-->
            <div class="col-md-2 col-6">
              <button class="btn btn-outline-primary w-100 shadow-sm" type="button" id="boton-ordenar" title="Cambiar orden por fecha">
                <i class="bi bi-sort-down me-1"></i> <span id="texto-orden">Nuevos</span>
              </button>
            </div>
          </div>
          
          <!-- contenedor para mostrar las tareas -->
          <div id="contenedor-tareas" class="list-group gap-2"></div>
        </div>
      </div>

    </section>
  </main>

  <!-- flotante para editar tareas -->
  <div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editTaskModalLabel">Editar Tarea</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formulario-editar-tarea">
            <input type="hidden" id="edit-tarea-id">
            <div class="mb-3">
              <label for="edit-tarea-titulo" class="form-label">Título</label>
              <input type="text" class="form-control" id="edit-tarea-titulo" required>
            </div>
            <div class="mb-3">
              <label for="edit-tarea-desc" class="form-label">Descripción</label>
              <textarea class="form-control" id="edit-tarea-desc" rows="3"></textarea>
            </div>
            <div class="mb-3">
              <label for="edit-tarea-estado" class="form-label">Estado de la Tarea</label>
              <select id="edit-tarea-estado" class="form-select" required>
                <option value="pendiente">Pendiente</option>
                <option value="en curso">En curso</option>
                <option value="en espera">En espera</option>
                <option value="finalizada">Finalizada</option>
              </select>
            </div>
            <div class="text-end">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer mt-auto py-3 bg-dark bg-opacity-75">
    <div class="container text-center text-muted fs-5">
      <small class="text-white fw-bold">© 2026 Tus Tareas - Cilsa</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="tareas.js"></script>
</body>
</html>
